<script>
    const song = document.getElementById("locksong");
    const songp = document.getElementById("songp");

    function togglesong() {

        if (song.paused) {
            songp.src = "icons/songp.png";

            song.play();
        } else {
            song.pause();
            songp.src = "icons/songplay.png";
        }
    }

    // Array of songs
    const songs = [
        "sounds/myspacemark - dolce vita.mp3",
        "sounds/myspacemark - spring break.mp3",
        "sounds/myspacemark - Giuseppe.mp3",
    ];

    let currentSong = 0;
    const audio = document.getElementById("locksong");
    const songDesc = document.getElementById("songdescription");
    songDesc.textContent = songs[currentSong].split("/").pop().replace(/\.mp3$/i, "");

    function songnext(direction) {
        currentSong += direction;
        if (currentSong > songs.length) {
            currentSong = 0;
        }

        if (currentSong < 0) {
            currentSong = songs.length - 1;
        }

        // wrap around the array
        if (currentSong >= songs.length) currentSong = 0;
        if (currentSong < 0) currentSong = songs.length - 1;

        // switch song
        audio.currentTime = 0;
        songp.src = "icons/songp.png";
        audio.src = songs[currentSong];
        audio.play();

        const name = songs[currentSong].split("/").pop().replace(/\.mp3$/i, "");
        songDesc.textContent = name;

    }

</script>

<script>
    const songslider = document.getElementById("songsliderdiv");
    const thumb = document.getElementById("songslider");
    const fill = document.getElementById("songsliderfill");

    let dragging = false;

    function setSlider(x) {
        const rect = songslider.getBoundingClientRect();
        x = Math.max(0, Math.min(x, rect.width));

        thumb.style.left = `${x}px`;
        fill.style.width = `${x}px`;
    }

    /* init */
    window.addEventListener("load", () => {
        const rect = songslider.getBoundingClientRect();
        setSlider(rect.width * 0.8);
    });

    /* pointer down */
    thumb.addEventListener("pointerdown", (e) => {
        dragging = true;
        thumb.setPointerCapture(e.pointerId);
        e.preventDefault();
    });

    /* pointer move */
    songslider.addEventListener("pointermove", (e) => {
        if (!dragging) return;

        const rect = songslider.getBoundingClientRect();
        setSlider(e.clientX - rect.left);
    });

    /* pointer up */
    document.addEventListener("pointerup", () => dragging = false);

    /* tap on bar */
    songslider.addEventListener("pointerdown", (e) => {
        const rect = songslider.getBoundingClientRect();
        setSlider(e.clientX - rect.left);
    });

</script>

<script>

    //CAPTURE PHOTO
    const video = document.getElementById("videocamera");

    const shotBtn = document.getElementById("shot");

    // Take screenshot of visible video area
    shotBtn.addEventListener("click", () => {

        const audio = new Audio('sounds/camera.MP3');
        audio.play();
        // Get visible video size
        const rect = video.getBoundingClientRect();
        const cw = rect.width;
        const ch = rect.height;

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        const canvas = document.createElement("canvas");
        canvas.width = cw;
        canvas.height = ch;
        const ctx = canvas.getContext("2d");

        // Handle object-fit: cover crop
        const containerRatio = cw / ch;
        const videoRatio = vw / vh;

        let sx, sy, sw, sh;

        if (videoRatio > containerRatio) {
            sw = vh * containerRatio;
            sh = vh;
            sx = (vw - sw) / 2;
            sy = 0;
        } else {
            sw = vw;
            sh = vw / containerRatio;
            sx = 0;
            sy = (vh - sh) / 2;
        }

        // Handle mirror if applied
        const style = window.getComputedStyle(video);
        const transform = style.transform || "none";
        if (transform.includes("-1")) {
            ctx.translate(cw, 0);
            ctx.scale(-1, 1);
        }

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);

        // Save or share
        if (window.innerWidth < 600 && navigator.share) {
            // Mobile: try Web Share API
            canvas.toBlob((blob) => {
                if (!blob) return;
                const file = new File([blob], 'IMG_1258.png', { type: 'image/png' });

                navigator.share({
                    files: [file],
                    title: 'Shot on Iphone',
                    text: 'love myspacemark'
                }).catch(err => {
                    console.log('Share failed, opening preview instead:', err);
                    const url = URL.createObjectURL(blob);
                    window.open(url, '_blank'); // fallback
                });
            }, 'image/png');
        } else {
            // Desktop fallback: download
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `shot-${Date.now()}.png`;
                a.click();
                URL.revokeObjectURL(url);
            }, "image/png");
        }
    });

</script>

<script>
    let switchBtn = document.getElementById("switchcamera");
    let currentStream = null;
    let usingFrontCamera = true; // start with front camera

    async function startCamera(facingMode = "user") {
        try {
            // Stop any existing streams
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            // Request media
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode },
                audio: false
            });

            video.srcObject = currentStream;

            // Mirror front camera
            if (facingMode === "user") {
                video.style.transform = "scaleX(-1)";
            } else {
                video.style.transform = "scaleX(1)";
            }

            usingFrontCamera = facingMode === "user";

        } catch (err) {
            console.warn("No back/front camera or error:", err);
            // Desktop fallback: just flip horizontally
            video.style.transform = usingFrontCamera ? "scaleX(1)" : "scaleX(-1)";
            usingFrontCamera = !usingFrontCamera;
        }
    }

    // Initial camera

    switchBtn.addEventListener("click", () => {
        // Flip between front and back if available
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const newFacing = usingFrontCamera ? "environment" : "user";
            startCamera(newFacing);
        } else {
            // Fallback for desktop
            video.style.transform = usingFrontCamera ? "scaleX(1)" : "scaleX(-1)";
            usingFrontCamera = !usingFrontCamera;
        }
    });
</script>
<script>
    const slider = document.getElementById("slider");
    const slide = document.getElementById("slide");

    let opened = false;

    let isDragging = false;
    let startX = 0;
    let startLeft = 0;

    const unlockSound = new Audio('sounds/unlock.MP3');

    function start(e) {
        isDragging = true;
        slider.classList.add("dragging");
        startX = (e.touches ? e.touches[0].clientX : e.clientX);
        startLeft = slider.offsetLeft;

    }

    function move(e) {
        if (!isDragging) return;

        const x = (e.touches ? e.touches[0].clientX : e.clientX);
        let newLeft = startLeft + (x - startX);

        newLeft = Math.max(0, Math.min(newLeft, slide.clientWidth - slider.clientWidth));
        slider.style.left = newLeft + "px";

        //opacity
        const unlockText = document.getElementById("unlocktext");
        const maxLeft = slide.clientWidth - slider.clientWidth;
        let opacity = 1 - (newLeft / maxLeft) * 2;
        opacity = Math.max(0, Math.min(1, opacity));
        unlockText.style.opacity = opacity;
    }

    const unlock = document.getElementById("unlock");
    const main = document.getElementById("main");
    const tops = document.getElementById("top");

    function stop() {
        if (!isDragging) return;
        isDragging = false;
        slider.classList.remove("dragging");

        const max = slide.clientWidth - slider.clientWidth;
        const position = slider.offsetLeft;

        if (position > max / 2) {
            // Snap Right
            slider.style.left = max + "px";

            setTimeout(() => {
                // alert("hi");

                unlockSound.currentTime = 0;
                unlockSound.play();

                opened = true;

                unlock.style.animation = 'unlockExpand 0.3s ease-in-out forwards';
                setTimeout(() => {
                    unlock.style.display = "none"
                    main.style.display = "flex"
                    updateTime();

                    tops.style.background = "rgba(0,0,0,0.7)";

                }, 300);

            }, 300);
        } else {
            // Snap Left
            slider.style.left = "0px";
        }
    }

    slider.addEventListener("mousedown", start);
    slider.addEventListener("touchstart", start);

    document.addEventListener("mousemove", move);
    document.addEventListener("touchmove", move, { passive: false });

    document.addEventListener("mouseup", stop);
    document.addEventListener("touchend", stop);

</script>
<script>
    const locktime = document.getElementById("locktime");
    function updateTime() {
        const timeEl = document.getElementById("time");
        const now = new Date();

        let hours = now.getHours();
        let minutes = now.getMinutes();

        // Optional: leading zero for nicer format
        if (hours < 10) hours = "0" + hours;
        if (minutes < 10) minutes = "0" + minutes;

        timeEl.textContent = `${hours}:${minutes}`;
        if (opened === true) {
            let displayHours = now.getHours();
            let period = displayHours >= 12 ? "PM" : "AM";

            displayHours = displayHours % 12 || 12;

            locktime.textContent = `${displayHours}:${minutes} ${period}`;
        }
    }

    // Run instantly
    updateTime();
    // Update every second
    setInterval(updateTime, 1000);

</script>
<script>
    function updateDate() {
        const dateEl = document.getElementById("date");
        const now = new Date();

        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const months = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        const day = days[now.getDay()];
        const month = months[now.getMonth()];
        const date = now.getDate();

        dateEl.textContent = `${day}, ${month} ${date}`;
    }

    updateDate(); // run once on load

</script>
